                [90, 180]
            ],
            maxBoundsViscosity: 1.0,
            worldCopyJump: false,
            
            // 关闭所有会导致闪屏/灰块的动画
            zoomAnimation: false,
            fadeAnimation: false,
            markerZoomAnimation: false,
            inertia: false,           // 关闭惯性滑动（最容易导致空白）
            inertiaDeceleration: 0,
            
            // 强制预加载周边瓦片，彻底消除灰色块
            keepBuffer: 10,
            updateWhenIdle: true,    // 仅静止时更新，避免渲染冲突
            updateWhenZooming: false
        });

        // 初始视角：太平洋居中（稳定无抖动）
        map.setView([0, 180], 2);

        // 地图瓦片（保持你原来的源，只加稳定参数）
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; 小说妹 & OpenStreetMap',
            maxZoom: 19,
            minZoom: 2,
            noWrap: true,        // 禁止地图重复
            crossOrigin: true,   // 解决跨域渲染异常
            keepBuffer: 10
        }).addTo(map);

        // 地图加载完成后再渲染标记，避免顺序错乱
        map.whenReady(() => {
            console.log("✅ 地图稳定加载完成");
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    function refreshMarkers() {
        if (markerGroup) markerGroup.clearLayers();
        markerGroup = L.layerGroup().addTo(map);
        const groupMap = new Map();
        validData.forEach(loc => {
            const key = `${loc.lat},${loc.lng}`;
            if (!groupMap.has(key)) groupMap.set(key, []);
            groupMap.get(key).push(loc);
        });
        markerList = [];
        for (let [coord, locs] of groupMap.entries()) {
            const [lat, lng] = coord.split(',').map(Number);
            let popupHtml = `<div style="max-height:320px;overflow-y:auto;">`;
            locs.forEach(l => {
                popupHtml += `<div class="popup-novel-item"><div class="popup-novel-title">📖 ${escapeHtml(l.title)}</div><div class="popup-city">📍 ${escapeHtml(l.city)}</div><div class="popup-quote">“${escapeHtml(l.quote)}”</div></div>`;
            });
            popupHtml += `<div class="badge-location">✨ 该地点共有 ${locs.length} 部作品</div></div>`;
            const marker = L.marker([lat, lng]).bindPopup(popupHtml);
            marker.addTo(markerGroup);
            markerList.push({ marker, locations: locs });
        }
        const uniqueNovels = new Set(validData.map(l => l.title));
        document.getElementById('novelCount').innerHTML = `📍 ${markerList.length} 个聚合点 | ${uniqueNovels.size} 部小说`;
    }

    function searchNovelAndFly(keyword) {
        if (!keyword.trim()) { showToast("请输入小说名"); return; }
        const searchKey = keyword.replace(/[《》]/g, '').trim().toLowerCase();
        
        currentSearchResult = validData.filter(item => 
            item.title.toLowerCase().includes(searchKey)
        );

        if (currentSearchResult.length === 0) {
            nextBtn.style.display = 'none';
            showToast(`未找到「${keyword}」`);
            return;
        }

        currentIndex = 0;
        showCurrentLocation();
        nextBtn.style.display = currentSearchResult.length > 1 ? 'block' : 'none';
        showToast(`已找到《${currentSearchResult[0].title}》，共 ${currentSearchResult.length} 个地点`);
    }

    function showCurrentLocation() {
        const loc = currentSearchResult[currentIndex];
        map.flyTo([loc.lat, loc.lng], 12);
        const group = markerList.find(g => 
            g.locations.some(item => 
                item.lat === loc.lat && item.lng === loc.lng && item.title === loc.title
            )
        );
        if (group) group.marker.openPopup();
    }

    nextBtn.addEventListener('click', () => {
        if (currentSearchResult.length <= 1) return;
        currentIndex = (currentIndex + 1) % currentSearchResult.length;
        showCurrentLocation();
        const loc = currentSearchResult[currentIndex];
        showToast(`已切换至：${loc.city}`);
    });

    // 重置视角 → 回到太平洋中心全景
    function resetMapView() {
        map.flyTo([0, 180], 2);
        nextBtn.style.display = 'none';
        showToast("已重置为太平洋全景");
    }

    function showToast(msg, dur=2000) {
        let t = document.getElementById('toastMsg');
        clearTimeout(window.tt);
        t.textContent = msg;
        t.style.opacity = 1;
        window.tt = setTimeout(() => t.style.opacity = 0, dur);
    }

    function addNovelFromForm() {
        let title = document.getElementById('novelName').value.trim();
        let city = document.getElementById('cityName').value.trim();
        let quote = document.getElementById('quoteText').value.trim() || "珍藏于此";
        let lat = parseFloat(document.getElementById('lat').value);
        let lng = parseFloat(document.getElementById('lng').value);
        if (!title || !city) { showToast("请填写小说名和城市"); return; }
        if (isNaN(lat) || isNaN(lng)) { showToast("请填写有效经纬度或使用拾取"); return; }
        validData.push({ title, city, lat, lng, quote });
        refreshMarkers();
        document.getElementById('novelName').value = '';
        document.getElementById('cityName').value = '';
        document.getElementById('quoteText').value = '';
        document.getElementById('lat').value = '';
        document.getElementById('lng').value = '';
        showToast(`已添加《${title}》@${city}`);
    }

    function resetDefault() {
        if(confirm("恢复默认将清除手动添加的数据，确定吗？")) location.reload();
    }

    let picking = false;
    function enablePick() {
        if(picking) return;
        picking = true;
        map.getContainer().style.cursor = 'crosshair';
        showToast("点击地图拾取坐标", 2000);
        const onClick = (e) => {
            document.getElementById('lat').value = e.latlng.lat.toFixed(6);
            document.getElementById('lng').value = e.latlng.lng.toFixed(6);
            map.getContainer().style.cursor = '';
            map.off('click', onClick);
            picking = false;
            showToast("坐标已填入");
        };
        map.once('click', onClick);
        setTimeout(() => { if(picking) { map.getContainer().style.cursor = ''; map.off('click', onClick); picking = false; } }, 10000);
    }

    function initPanel() {
        const panel = document.getElementById('addPanel');
        document.getElementById('panelToggle').addEventListener('click', () => {
            panel.classList.toggle('open');
            document.querySelector('.toggle-icon').innerHTML = panel.classList.contains('open') ? '▲' : '▼';
        });
    }

    function bindEvents() {
        document.getElementById('searchBtn').onclick = () => searchNovelAndFly(document.getElementById('searchInput').value);
        document.getElementById('searchInput').onkeypress = e => { if(e.key === 'Enter') searchNovelAndFly(e.target.value); };
        document.getElementById('resetViewBtn').onclick = resetMapView;
        document.getElementById('addNovelBtn').onclick = addNovelFromForm;
        document.getElementById('resetDefaultBtn').onclick = resetDefault;
        document.getElementById('getCoordFromMapBtn').onclick = enablePick;
    }

    function initApp() {
        initMap();
        map.whenReady(() => refreshMarkers());
        bindEvents();
        initPanel();
        showToast(`🌸 全量地图已加载 | 共 ${validData.length} 条小说记录，${new Set(validData.map(l=>l.title)).size} 部作品`, 5000);
    }

    window.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
